<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Release It</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">Release It</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
			<ul class="navbar-nav ms-auto">
			    <li class="nav-item">
			        <a class="nav-link" href="/">Home</a>
			    </li>
			    <li class="nav-item">
			        <a class="nav-link" href="/viewentries">View Entries</a>
			    </li>

			    <li class="nav-item">
			        <a class="nav-link" href="/about">About</a>
			    </li>
			</ul>
        </div>
    </div>
</nav>

<!-- ENTRY FORM -->
<div class="container mt-5">

    <h2 class="mb-4">Create New Entry</h2>

    <form th:action="@{/save-entry}" th:object="${entry}" method="post">

        <!-- TEXT ENTRY -->
        <div class="mb-3">
            <label class="form-label">Entry</label>
            <textarea class="form-control" rows="5"
                      th:field="*{journalEntry}"
                      placeholder="Let it out..."></textarea>
        </div>

        <!-- PUBLIC CHECKBOX -->
        <div class="form-check mb-3">
            <input class="form-check-input"
                   type="checkbox"
                   th:field="*{publicEntry}"
                   id="publicEntry">

            <label class="form-check-label" for="publicEntry">
                Make Public
            </label>
        </div>

        <!-- SUBMIT BUTTON -->
        <button type="submit" class="btn btn-primary">
            Save Entry
        </button>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
