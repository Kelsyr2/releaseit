<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Release It</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>				
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">Release It</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/viewentries"> ViewEntries</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/new-entry">New Entry</a>
                </li>
				<li class="nav-item">
				        <a class="nav-link" href="/about">About</a>
				</li>
				<li class="nav-item">
				        <a class="nav-link active" href="/register">Register</a>
				</li>
				<li class="nav-item">
				        <a class="nav-link" href="/login">Login</a>
				</li>
            </ul>
        </div>
    </div>
</nav>

<!-- HERO SECTION -->
<div class="container mt-5">

    <div class="text-center">

        <!-- Welcome Message -->
        <h1 class="display-4" th:text="${message}">Welcome to Your Journal</h1>

        <!-- Description -->
        <p class="lead mt-3">
            Your personal digital journal to capture thoughts, moods, and daily reflections.
        </p>

        <!-- BUTTONS -->
        <div class="mt-4">
            <a href="/new-entry" class="btn btn-primary btn-lg me-2">Create New Entry</a>
            <a href="/viewentries" class="btn btn-outline-secondary btn-lg">View All Entries</a>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
