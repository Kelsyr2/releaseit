<!DOCTYPE html>

<head>

    <title>Release It</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>				
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">Release It</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/viewentries"> ViewEntries</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/new-entry">New Entry</a>
                </li>
				<li class="nav-item">
				        <a class="nav-link" href="/about">About</a>
				</li>
				<li class="nav-item">
				        <a class="nav-link active" href="/register">Register</a>
				</li>
				<li class="nav-item">
				        <a class="nav-link" href="/login">Login</a>
				</li>
            </ul>
        </div>
    </div>
</nav>

    <div class="p-5 mb-4 bg-primary text-white rounded-3">
        <div class="container-fluid py-4">
            <h1 class="display-5 fw-bold">Welcome Back</h1>
            <p class="col-md-8 fs-5">
                Log in to continue your journaling journey with Release It.
            </p>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">

            <form th:action="@{/login}" method="post">

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" name="email">
                </div>

                <button type="submit" class="btn btn-primary">Login</button>

            </form>

        </div>
